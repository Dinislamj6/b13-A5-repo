<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>


    <!-- tailwind and daisy UI CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- navbar -->
    <nav class="w-11/12 mx-auto">
        <div class="flex justify-between pt-5">
            <div class="flex items-center justify-center space-x-2">
                <div> <img src="./assets/github-logo.png" alt="" height="36" width="36"></div>
                <h2 class="font-semibold text-[#1F2937] text-2xl">GitHub Issues Tracker</h2>
            </div>
            <!-- search input -->
            <div class="search-input flex space-x-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                </label>
                <div><button id="btn-search" class="btn btn-primary">Search</button></div>
            </div>


        </div>
    </nav>
    <!-- button section -->
    <section class="all-btn flex space-x-4 w-10/12 h-15 bg-base-200 mx-auto mt-5 rounded-md p-4">

        <button id="tab-All" onclick="switchTab('All')" class="btn btn-sm btn-primary">All</button>

        <button id="tab-Open" onclick="switchTab('Open')" class="btn btn-sm">Open</button>

        <button id="tab-Closed" onclick="switchTab('Closed')" class="btn btn-sm">Closed</button>

    </section>
    <!-- main section -->
    <main>
        <section class="w-11/12 mx-auto bg-base-200  mt-5 shadow-lg">
            <!-- 50 issus -->
            <div class="all-issus">
                <!-- parent div -->

                <div class="flex justify-between items-center">
                    <div class="flex space-x-2 pl-2">
                        <img src="./assets/Aperture.png" alt="">
                        <div>
                            <h2 id="issues-count" class="font-semibold text-xl">50 Issues</h2>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex p-5 space-x-7 items-center">

                        <div class="flex items-center space-x-2">
                            <div class="bg-[#00A96E] w-1 p-2 rounded-full">

                            </div>
                            <p class="font-bold">Open</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="bg-[#A855F7] w-1 p-2 rounded-full">

                            </div>
                            <p class="font-bold">Closed</p>
                        </div>
                    </div>
                </div>
                <hr>
                <!-- card section -->

                <section id="cardContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                </section>

                <!-- open card container -->
                <section id="openCardContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                </section>

                <!-- close card container -->
                <section id="closeCardContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                </section>

                <!-- loading spinner  -->
                <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
                    <span class="loading loading-dots loading-xl"></span>
                </div>
        </section>

        <!-- modal -->
        <div id="modalContainer">
            <dialog id="issus-details-modal" class="modal">
            </dialog>
        </div>
    </main>



    <script src="./js/script.js"></script>
</body>

</html>
