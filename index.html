<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind and daisy UI CDN-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Home Page -->
    <section class="min-h-screen max-w-md bg-base-200 mx-auto shadow-md">
        <div class="logo w-[150px] mx-auto space-y-8 pt-10">
            <img src="./assets/github-logo.png" alt="">
        </div>
        <div>
            <h2 class="font-bold text-2xl text-center">GitHub Issues Tracker</h2>
            <p class="text-center">Sign in to manage your issues</p>
        </div>
        <!-- form -->
        <div class="form pt-10">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-[#1F2937]">Username</label>
                        <input id="input-user" type="text" class="input" placeholder="Enter Username" />
                        <br>
                        <label class="label font-bold text-[#1F2937]">Password</label>
                        <input id="input-password" type="password" class="input" placeholder="Password" />

                        <button id="sign-btn" class="btn btn-primary mt-4">Sign In</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>














    <script src="./js/login.js"></script>
</body>

</html>
